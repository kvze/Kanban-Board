<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban board</title>
    <link rel="icon" href="img/icon.svg" type="image/svg+xml" sizes="any">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-heading">
            <svg class="header-icon" xmlns="http://www.w3.org/2000/svg" fill="#f59d18" width="60" height="60" viewBox="0 0 256 256" aria-hidden="true">
                <path d="M120,48v64a7.9954,7.9954,0,0,1-8,8H48a7.99539,7.99539,0,0,1-8-8V48a7.99539,7.99539,0,0,1,8-8h64A7.9954,7.9954,0,0,1,120,48Zm88-8H144a7.99539,7.99539,0,0,0-8,8v64a7.99539,7.99539,0,0,0,8,8h64a7.9954,7.9954,0,0,0,8-8V48A7.9954,7.9954,0,0,0,208,40Zm-96,96H48a7.99539,7.99539,0,0,0-8,8v64a7.99539,7.99539,0,0,0,8,8h64a7.9954,7.9954,0,0,0,8-8V144A7.9954,7.9954,0,0,0,112,136Zm96,0H144a7.99539,7.99539,0,0,0-8,8v64a7.99539,7.99539,0,0,0,8,8h64a7.9954,7.9954,0,0,0,8-8V144A7.9954,7.9954,0,0,0,208,136Z"/>
            </svg>
            <h1 class="header-title">
                Project board
            </h1>
        </div>
        <p class="header-description">
            Manage your task efficiently
        </p>
    </header>
    <main class="board">
        <section class="column" data-status="queue">
            <div class="column-header">
                <h2 class="column-title">
                    In queue
                    <span class="column-count">0</span>
                </h2>
                <button class="column-button">+</button>
            </div>

            <div class="task-form-wrapper hidden"></div>

            <div class="column-cards"></div>
        </section>
        <section class="column" data-status="progress">
            <div class="column-header">
                <h2 class="column-title">
                    In progress
                    <span class="column-count">0</span>
                </h2>
                <button class="column-button">+</button>
            </div>

            <div class="task-form-wrapper hidden"></div>

            <div class="column-cards"></div>
        </section>
        <section class="column" data-status="done">
            <div class="column-header">
                <h2 class="column-title">
                    Done
                    <span class="column-count">0</span>
                </h2>
                <button class="column-button">+</button>
            </div>

            <div class="task-form-wrapper hidden"></div>

            <div class="column-cards"></div>
        </section>
    </main>
    <script type="module" src="js/app.js"></script>
</body>
</html>
